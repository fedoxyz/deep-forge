version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev.frontend
    container_name: deep-forge-frontend-dev

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    environment:
      - CHOKIDAR_USEPOLLING=true

    command: npm run dev -- --host 0.0.0.0

    depends_on:
      - backend

    restart: unless-stopped
